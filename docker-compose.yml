services:
  postgres:
    image: postgres:16
    container_name: conference-room-postgres
    environment:
      POSTGRES_DB: conference_room_dev
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: app_password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data: